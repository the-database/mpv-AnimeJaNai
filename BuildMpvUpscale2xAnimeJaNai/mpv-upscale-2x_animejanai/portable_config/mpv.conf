# Your mpv settings. Safe to edit - updates never overwrite this file.
#
# The include below pulls in AnimeJaNai's managed defaults; the
# `profile = animejanai` line applies them. Put your own settings BELOW that
# line - mpv applies them after the defaults, so they override the managed
# defaults. Do not edit mpv-animejanai.conf - it is replaced on every update.

include="~~/mpv-animejanai.conf"
profile = animejanai

# ===== Your settings below =====
# Examples - uncomment to enable:
#fs                     # start fullscreen
#cursor-autohide=1000  # hide the cursor after 1 second of no movement
#blend-subtitles=no    # sharper subtitles (overrides the managed default)
#volume-max=130        # allow boosting volume above 100% (overrides default)
