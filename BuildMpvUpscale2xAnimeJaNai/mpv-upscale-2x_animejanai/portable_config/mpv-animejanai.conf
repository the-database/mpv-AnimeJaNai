# AnimeJaNai managed settings - DO NOT EDIT.
# Replaced on every update. Put your own settings in mpv.conf, which includes
# this file, applies the [animejanai] profile below via `profile = animejanai`,
# and is never overwritten by updates.

# profile-restore must stay at the default (top-level) scope: it governs the
# backup/restore behavior of apply-profile (the upscale-on/off safety-net
# toggle used by input.conf). Do not move it into [animejanai].
# Sets the profile restore method to "copy if equal".
profile-restore=copy-equal

# ===== Managed defaults =====
# mpv.conf applies this profile via `profile = animejanai` BEFORE the user's
# own lines, so anything the user sets in mpv.conf after that line wins.
[animejanai]

# Uses GPU-accelerated video output by default.
vo=gpu-next
# Can cause performance problems with some GPU drivers and GPUs.
profile=high-quality
gpu-api=vulkan,auto
vulkan-queue-count=3

# If the above cause playback problems, override them in mpv.conf (it applies
# this profile, then your own lines, so your settings win) - e.g. gpu-api=auto.

# Source: https://github.com/hl2guide/better-mpv-config

# External Sources:
# * https://raw.githubusercontent.com/classicjazz/mpv-config/master/mpv.conf

# Hardware decoding. The native inference filter consumes GPU frames
# directly: CUDA frames for the TensorRT backend, D3D11 frames for
# DirectML. scripts/animejanai_backend.lua adjusts this per the backend
# configured in animejanai.conf; nvdec is the TensorRT default.
hwdec=nvdec

# Slot switches load TensorRT engines on the player loop (25-50 ms
# cached, ~400 ms for RIFE chains and first activation); a deeper
# audio buffer rides out the stall without audible dropouts.
audio-buffer=0.6

hr-seek=yes

# Sets a custom font
osd-font = 'Segoe UI'
osd-font-size=55
osd-scale=0.5

# Saves the seekbar position on exit
save-position-on-quit=yes
watch-later-options=start
reset-on-next-file=pause

# Uses a large seekable RAM cache even for local input.
cache=yes
cache-pause=yes
cache-pause-initial=yes
cache-secs=30
# Uses extra large RAM cache (needs cache=yes to make it useful).
demuxer-max-bytes=768M
demuxer-max-back-bytes=384M
demuxer-cache-wait=no

# ===== Audio =====

# Sets volume to 100%.
volume=100
volume-max=100

# ===== Subtitles =====
# Subtitles are blended into the video frame; for sharper subs set
# blend-subtitles=no in mpv.conf.
blend-subtitles=video

# The stable subtitle path: every GPU/threaded subtitle feature of the mpv fork
# is off, so rendering behaves like stock mpv. The AnimeJaNai Manager's "GPU
# Subtitle Rendering (Experimental)" checkbox switches this for the [subs-gpu]
# profile below. Set any of these in mpv.conf to override (mpv.conf applies
# this profile first, so your own lines win).
sub-gpu-raster=no
sub-render-ahead-frames=0
# 1 = single-threaded libass (0 would mean "auto", i.e. one thread per CPU).
sub-ass-render-threads=1
# 0 = no overlay-build deadline (-1 would arm it at the frame duration, which
# can substitute a stale or empty overlay when a frame's subtitles run long).
sub-present-guard-ms=0
osd-render-res-cap=0
# stats.lua's persistent_overlay defaults to no, so nothing to set here.

alang = 'jpn'
slang = 'eng'

dither-depth=auto
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=16
deband-grain=48
glsl-shader="~~/shaders/noise_static_luma.hook"
glsl-shader="~~/shaders/noise_static_chroma.hook"

screenshot-format=png
screenshot-directory=~~/screenshots/
screenshot-template='%F__%P__%04n'

# delay repeating commands when holding key down
input-ar-delay=500

# display images indefinitely
image-display-duration = 'inf'

# Turns upscaling on by default (replaces the former [default] profile=upscale-on).
profile=upscale-on


# loop .gif animations
[extension.gif]
loop-file=inf

# loop .webm animations
[extension.webm]
loop-file=inf

# Experimental GPU subtitle rendering. Opt-in: enabled by the AnimeJaNai
# Manager's "GPU Subtitle Rendering" checkbox, which writes
# [global] sub_render_mode=gpu into animejanai.conf; scripts/
# animejanai_backend.lua applies this profile at startup when it sees that.
# Applying it by hand (profile=subs-gpu in mpv.conf) works too.
#
# ASS/SSA glyph rasterization, blur and compositing run on the GPU
# (sub-gpu-raster), subtitles for upcoming frames are rendered on a worker
# thread instead of the display thread (sub-render-ahead-frames), and the
# overlay build gets a per-frame deadline so a heavy subtitle frame can never
# stall presentation (sub-present-guard-ms=-1 = the frame duration). The OSD
# (stats display, OSC) is rendered at up to 1440p and GPU-upscaled so it does
# not contend with subtitles at 4K+. Requires vo=gpu-next and the forked
# libass; both ship with this package. Subtitles must be composited as an
# overlay rather than blended into the video frame, hence blend-subtitles=no.
[subs-gpu]
blend-subtitles=no
sub-gpu-raster=yes
sub-render-ahead-frames=24
# 0 = auto: one libass render thread per CPU.
sub-ass-render-threads=0
sub-present-guard-ms=-1
osd-render-res-cap=1440
# The stats overlay (Ctrl+J) redraws constantly; keeping it in its own OSD
# layer stops it from being overwritten by - and fighting with - other OSD output.
script-opts-append=stats-persistent_overlay=yes

# Native inference filter (vf_animejanai): a single profile inserts the
# filter; slots switch at runtime via vf-command (see input.conf) without
# rebuilding the chain. Quality/Balanced/Performance are built-in slots
# 1001/1002/1003; custom slots 1-9 come from animejanai.conf. aji.dll is
# loaded from the mpv.exe directory.
[upscale-off]
vf=""
[upscale-on]
vf=@aji:animejanai:lib=~~/../animejanai/inference/aji.dll:conf=~~/../animejanai/animejanai.conf:model-dir=~~/../animejanai/onnx:rife-model-dir=~~/../animejanai/rife:trtexec=~~/../animejanai/inference/trtexec.exe:stats=~~/../animejanai/currentanimejanai.log:slot=1002
