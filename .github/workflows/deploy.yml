name: Deploy

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version'
        required: true

jobs:
  deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'  # Must match <TargetFramework> in BuildMpvUpscale2xAnimeJaNai.csproj

    - name: Publish .NET Core app
      run: dotnet publish BuildMpvUpscale2xAnimeJaNai/BuildMpvUpscale2xAnimeJaNai.csproj -c Release -o publish

    - name: Run the console app
      # --packs also emits component-*.7z + packs.json (publish/packs-v<ver>/) for the
      # AnimeJaNai Manager (updater --components/--install/--remove/--auto).
      run: ./publish/BuildMpvUpscale2xAnimeJaNai.exe ${{ github.event.inputs.release_version }} --packs

    - name: Build updater and add it to the package
      shell: pwsh
      run: |
        dotnet publish AnimeJaNaiUpdater/AnimeJaNaiUpdater.csproj -c Release -o updater-publish
        Copy-Item updater-publish/AnimeJaNaiUpdater.exe "publish/mpv-upscale-2x_animejanai-v${{ github.event.inputs.release_version }}/AnimeJaNaiUpdater.exe" -Force

    - name: Install 7zip
      run: choco install 7zip -y

    # Setup installer (per-user, GPU-aware component picker), wrapping the same
    # slim core tree. The component packs install on demand post-install via the
    # updater, so the installer stays small.
    - name: Build setup installer
      shell: pwsh
      run: |
        choco install innosetup -y
        $ver = "${{ github.event.inputs.release_version }}"
        & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
          "/DAppVersion=$ver" `
          "/DSourceDir=$(Resolve-Path "publish/mpv-upscale-2x_animejanai-v$ver")" `
          "/O$(Get-Location)" `
          installer/animejanai.iss

    # The "full package" is the slim core: hardware-specific components ship
    # as the component-*.7z assets and install on demand via the Manager.
    - name: Create 7zip archive of the artifact (full package)
      run: 7z a -t7z -mx=9 -v1900m mpv-upscale-2x_animejanai-full-package-${{ github.event.inputs.release_version }}.7z ./publish/mpv-upscale-2x_animejanai-v${{ github.event.inputs.release_version }}

    - name: Create overlay archive and stage manifest
      shell: pwsh
      run: |
        $ver = "${{ github.event.inputs.release_version }}"
        $pkg = "publish/mpv-upscale-2x_animejanai-v$ver"
        # manifest.json is uploaded as a standalone asset so the updater can compare deps before downloading.
        Copy-Item "$pkg/manifest.json" "manifest.json" -Force
        # The lightweight overlay contains only the managed program files listed in the manifest,
        # archived relative to the install root so it overlays directly onto an existing install.
        $paths = (Get-Content "$pkg/manifest.json" -Raw | ConvertFrom-Json).overlay_paths
        $out = Join-Path (Get-Location) "mpv-upscale-2x_animejanai-overlay-$ver.7z"
        Push-Location $pkg
        & 7z a -t7z -mx=9 $out @paths
        Pop-Location

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.release_version }}
        name: ${{ github.event.inputs.release_version }}
        draft: true
        prerelease: false
        allowUpdates: true
        artifacts: "mpv-AnimeJaNai-Setup-${{ github.event.inputs.release_version }}.exe,mpv-upscale-2x_animejanai-full-package-${{ github.event.inputs.release_version }}.7z.*,mpv-upscale-2x_animejanai-overlay-${{ github.event.inputs.release_version }}.7z,manifest.json,publish/packs-v${{ github.event.inputs.release_version }}/component-*.7z,publish/packs-v${{ github.event.inputs.release_version }}/packs.json"
        token: ${{ secrets.GITHUB_TOKEN }}

  # Linux leg. Runs in the old-baseline build image (Ubuntu 22.04 + CUDA toolkit
  # + TensorRT 11 + .NET 10 SDK + 7zz + luajit + mpv build deps) so the artifacts
  # carry a low glibc floor. The image is built/pushed by the build-image
  # workflow; the Linux mpv fork bundle + aji.so are consumed from their sibling
  # repos' releases (the assembler downloads them). Assets are shared on the same
  # release tag, suffixed with the RID so they don't collide with the Windows
  # assets; the updater resolves its platform's assets by that suffix.
  deploy-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container:
      image: ghcr.io/the-database/animejanai-linux-build:ubuntu2204
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      VER: ${{ github.event.inputs.release_version }}
      TRT_LINUX_ROOT: /usr
      CUDA_LINUX_LIB: /usr/local/cuda/lib64
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Publish assembler (host RID = linux-x64)
      run: dotnet publish BuildMpvUpscale2xAnimeJaNai/BuildMpvUpscale2xAnimeJaNai.csproj -c Release -o publish

    - name: Run assembler (linux-x64, with packs)
      # Downloads aji-linux-x64.tar.zst + the Linux mpv fork bundle from the
      # sibling repos' releases; copies the TensorRT runtime from the image.
      # --packs emits component-*.7z + packs.json and slims the core tree.
      run: ./publish/BuildMpvUpscale2xAnimeJaNai "$VER" --target linux-x64 --packs

    - name: Build updater (linux-x64, single file)
      run: |
        dotnet publish AnimeJaNaiUpdater/AnimeJaNaiUpdater.csproj -c Release \
          -r linux-x64 --self-contained -p:PublishSingleFile=true -o updater-publish

    - name: Build benchmark tool (linux-x64) into the tree
      run: |
        dotnet publish AnimeJaNaiBenchmark/AnimeJaNaiBenchmark.csproj -c Release \
          -r linux-x64 --self-contained -p:PublishSingleFile=true \
          -o "publish/mpv-upscale-2x_animejanai-v$VER/animejanai/benchmarks"
        chmod +x "publish/mpv-upscale-2x_animejanai-v$VER/animejanai/benchmarks/AnimeJaNaiBenchmark" \
                 "publish/mpv-upscale-2x_animejanai-v$VER/animejanai/benchmarks/animejanai_benchmark_all.sh" 2>/dev/null || true

    # The AnimeJaNai Manager is downloaded + laid into the tree by the assembler
    # (InstallAnimeJaNaiManager) from the AnimeJaNaiManager repo's own linux-x64
    # release, exactly like the Windows flow - so no Manager build step here.

    - name: Package portable tarball (+ updater + install scripts)
      run: |
        chmod +x installer/linux/*.sh
        installer/linux/package-tarball.sh \
          "publish/mpv-upscale-2x_animejanai-v$VER" updater-publish/AnimeJaNaiUpdater "$VER" .

    - name: Build AppImage (runtime + RIFE baked in; per-SM kernels fetched on first run)
      # Reconstitute a tree with the inference runtime + RIFE (but NOT the ~1.8 GB
      # of per-SM builder resources) so the single AppImage stays under GitHub's
      # 2 GB asset limit; AppRun downloads the one pack matching the user's GPU on
      # first run.
      run: |
        full="appimage-tree/mpv-upscale-2x_animejanai-v$VER"
        mkdir -p "$full"
        cp -a "publish/mpv-upscale-2x_animejanai-v$VER/." "$full/"
        cp -f updater-publish/AnimeJaNaiUpdater "$full/AnimeJaNaiUpdater"
        chmod +x "$full/AnimeJaNaiUpdater"
        for p in "publish/packs-v$VER/component-trt-runtime-linux-x64.7z" \
                 "publish/packs-v$VER/component-rife-linux-x64.7z"; do
          [ -f "$p" ] && 7zz x -y -o"$full" "$p"
        done
        installer/linux/build-appimage.sh "$full" "$VER" .

    - name: Overlay archive + RID-suffixed manifest
      # Lightweight program-file overlay (the assembler already emits RID-suffixed
      # component packs + packs-linux-x64.json).
      run: |
        pkg="publish/mpv-upscale-2x_animejanai-v$VER"
        cp "$pkg/manifest.json" "manifest-linux-x64.json"
        mapfile -t paths < <(jq -r '.overlay_paths[]' "$pkg/manifest.json")
        ( cd "$pkg" && 7zz a -t7z -mx=9 \
            "$GITHUB_WORKSPACE/mpv-upscale-2x_animejanai-overlay-$VER-linux-x64.7z" "${paths[@]}" )

    - name: Create / update GitHub Release (Linux assets)
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.release_version }}
        name: ${{ github.event.inputs.release_version }}
        draft: true
        allowUpdates: true
        artifacts: "mpv-upscale-2x_animejanai-v${{ github.event.inputs.release_version }}-linux-x64.tar.zst,*.AppImage,mpv-upscale-2x_animejanai-overlay-${{ github.event.inputs.release_version }}-linux-x64.7z,manifest-linux-x64.json,publish/packs-v${{ github.event.inputs.release_version }}/component-*-linux-x64.7z,publish/packs-v${{ github.event.inputs.release_version }}/packs-linux-x64.json"
        token: ${{ secrets.GITHUB_TOKEN }}
